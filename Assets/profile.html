                        <img src="photos/selfhelp.webp" alt="Self Help">

                    </div>
                    
                    <div class="genre-box">
                        <img src="photos/romance.webp" alt="Romance">

                    </div>
                    
                    <div class="genre-box">
                        <img src="photos/thriller.webp" alt="Thriller">
                        <span>Thriller</span>
                    </div>
                </div>
            </div>
            
            <div class="friends-card">
                <h2>My Friends</h2>
                
                <div class="friend">
                    <img src="photos/레드크리스탈의 로고 속에는 팬지꽃이 있어요_팬지의 꽃말은 “나를 기억해 주세요”_많은 사람들의 기억 속에 오래 남는 브랜드가 되고 싶은 마음을 담아 상징 로고로 만들었어요__그 마음이 전해졌는지,_레드크리스탈을 기억해 주는 분들이 점점 많아지고 있어요__이럴 때 정말 뿌듯하답니다♥️.webp" alt="friend 1">
                    <p>Friend 1</p>
                </div>
                
                <div class="friend">
                    <img src="photos/name moodboard_ order for _nikki_ _ want one_ _ mood cafe.webp" alt="friend 2">
                    <p>Friend 2</p>
                </div>
                
                <div class="friend">
                    <img src="photos/download.webp" alt="friend 3">

                </div>
