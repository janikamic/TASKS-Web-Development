<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="homepage.css">
</head>
<body>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <header class="navbar">
        <div class="nav-left">
            
            <a href="homepage.html" class="logo-link">
                <img src="logos-icons/chapterly-logo.svg" alt="Chapterly Logo" class="chapterly-icon">
            </a>
            
            <nav class="nav-links">
                
                <a href="Bookshelves.html">My Bookshelves</a>
                <span class="divider"></span>
                
                <a href="Contact.html">Contact Us</a>
                <span class="divider"></span>
                
                <a href="Discover.html">Discover</a>
            </nav>
        </div>
        
        <div class="nav-right">
            <div class="search">
                
                <img src="logos-icons/search-icon.svg" alt="Search Icon">
                
                <input type="text" placeholder="Search Here">
                
            </div>
        </div>
    </header>
    
    
    
    <button class="menu-toggle" id="menuToggle">
        
        <span id="menuArrow">></span>
        
    </button>
    
    <aside class="sidebar" id="sidebar">
        
        <div class="profile-section">
            
            <h1>Chapterly</h1>
            
            <img src="photos/pfp.webp" alt="Profile Picture" class="profile-pic">
            
            <p>@username</p>
            
        </div>
        
        <nav class="sidebar-links">
            
            <a href="profile.html">My Profile</a>
            <a href="">Settings</a>
            <a href="">Notifications</a>
            <a href="discover.html">Discover</a>
            
        </nav>
        
        <div class="sidebar-socials">
            
            <a href="#">
                <img src="logos-icons/facebook-logo.svg" alt="Facebook">
            </a>
            
            <a href="#">
                <img src="logos-icons/instagram-logo.svg" alt="Instagram">
            </a>
        </div>
    </aside>
    
    <script src="script.js"></script>
    
    
    
    <section class="hero">
        <h1>The home of every story you'll love.</h1>
        <a href="discover.html">
            <button>Discover</button>
        </a>
    </section>
    
    <section class="current-book">
        
        <h2 class="section-title">I am currently reading...</h2>
        <div class="current-book">
            <img src="book cover.jpg" alt="Book Cover">
            
            <div class="book-info">
                <h2>Before the Coffee Gets Cold</h2>
                <p>Toshikazu Kawaguchi</p>
                
                <button class="resume-btn">
                    Resume reading
                </div>
            </button>
        </section>
    </div>
    <section class="trending">
        <h2 class="section-title">Trending this week</h2>
        
        <div class="carousel-container">
            <button class="prev">‹</button>
            
            <div class="carousel">
                <img src="photos/1984 book.jpg" alt="Book 1">
                <img src="photos/just for the summer book.jpg" alt="Book 2">
                <img src="photos/never lie book.jpg" alt="Book 3">
                <img src="photos/normal people bok.jpg" alt="Book 4">
                <img src="photos/the alchemist book.jpg" alt="Book 5">
                <img src="photos/conversations book.jpg" alt="Book 6">
                <img src="photos/picking daisies book.jpg" alt="Book 7">
                <img src="photos/book theif book.jpg" alt="Book 8">
                <img src="photos/Lucy Score Books in Order.jpg" alt="book 9">
                <img src="photos/The Let Them Theory - Special Loterijen.jpg"alt="book 10">
                <img src="photos/thenostalchick on LTK.jpg" alt="book 11">
                <img src="photos/3_25_25.jpg" alt="book 12">
            </div>
            
            <button class="next">›</button>
        </div>
    </section>
    
    <script>
        const carousel = document.querySelector('.carousel');
        const next = document.querySelector('.next');
        const prev = document.querySelector('.prev');
        
        next.addEventListener('click', () => {
            carousel.scrollBy({ left: 200, behavior: 'smooth' });
        });
        
        prev.addEventListener('click', () => {
            carousel.scrollBy({ left: -200, behavior: 'smooth' });
        });
    </script>
    
    
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Chapterly. All rights reserved.</p>
        </div>
    </footer>
    
    <script src="script.js"></script>
    
</body>
</html>
