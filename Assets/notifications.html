<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="notifications.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
</head>
<body>
    
    <header class="navbar">
        <div class="nav-left">
            
            <a href="homepage.html" class="logo-link">
                <img src="logos-icons/chapterly-logo.svg" alt="Chapterly Logo" class="chapterly-icon">
            </a>
            
            <nav class="nav-links">
                
                <a href="Bookshelves.html">My Bookshelves</a>
                <span class="divider"></span>
                
                <a href="Contact.html">Contact Us</a>
                <span class="divider"></span>
                
                <a href="Discover.html">Discover</a>
            </nav>
        </div>
        
        <div class="nav-right">
            <div class="search">
                
                <img src="logos-icons/search-icon.svg" alt="Search Icon">
                
                <input type="text" placeholder="Search Here">
                
            </div>
        </div>
    </header>
    
    <button class="menu-toggle" id="menuToggle">
        
        <span id="menuArrow">></span>
        
    </button>
    
    <aside class="sidebar" id="sidebar">
        
        <div class="profile-section">
            
            <h1>Chapterly</h1>
            
            <img src="photos/pfp.webp" alt="Profile Picture" class="profile-pic">
            
            <p>@username</p>
            
        </div>
        
        <nav class="sidebar-links">
            
            <a href="profile.html">My Profile</a>
            <a href="">Settings</a>
            <a href="">Notifications</a>
            <a href="discover.html">Discover</a>
            
        </nav>
        
        <div class="sidebar-socials">
            
            <a href="#">
                <img src="logos-icons/facebook-logo.svg" alt="Facebook">
            </a>
            
            <a href="#">
                <img src="logos-icons/instagram-logo.svg" alt="Instagram">
            </a>
        </div>
    </aside>
    
    <body>
        
        <section class="notifications-page">
            
            <div class="notifications-box">
                
                <div class="notifications-header">
                    
                    <h1>Notifications</h1>
                </div>
                <div class="notification-item">
                    
                    <div class="notification-left">
                        <span class="dot"></span>
                        
                        <div>
                            <h2>New Book Recommendation</h2>
                            <p>1hr ago</p>
                        </div>
                    </div>
                    
                    <div class="notification-right">
                        
                        <span>
                            Read <em>The Midnight Library</em>  Today
                        </span>
                    </div>
                </div>
                
                <div class="notification-line"></div>
                
                <p class="end-text">
                    End of Notifications
                </p>
            </div>
        </section>
    </body>
