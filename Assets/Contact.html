<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    
    <header class="navbar">
        <div class="nav-left">
            <a href="homepage.html">
                <img src="Logo & Icons/chapterly-logo.svg" class="search-icon" alt="search">
            </a>
            
            <ul>
                <li><a href="Bookshelves.html">My Bookshelves</a></li>
                <li><a href="Contact.html">Contact Us</a></li>
            </ul>
        </div>
        
        <div class="nav-right">
            <div class="search">
                <img src="Logo & Icons/search-icon.svg" alt="Search icon"classsearch-icon>
                <input type="text" placeholder="Search Here">
            </div>
        </div>
    </header>
    
    <section class="contact-section">
        
        <section class="contact-container">
            
            <div class="contact-info">
                
                <h2>Get in Touch!</h2>
                
                <div class="info-text">
                    
                    <p>Email:</p>
                    <span>chapterly@example.com</span>
                    
                    <p>Phone:</p>
                    <span>+134567890</span>
                    
                </div>
                
            </div>
            
            
            
            <form action="mailto:janikamicallef7@gmail.com"
            method="post"
            enctype="text/plain">
            
            
            <h3>Full Name</h3>
            <div id="divDetails">
                <input type="text" id="FullName" name="FullName" placeholder="Your Full Name" required>
            </div>
            
            
            
            
            <h3>Email </h3>
            <div>
                <input type="text" id="email" name="emailAddress" placeholder="Your Email Address" required>
            </div>
            
            
            
            <h3>Message</h3>
            <div>
                <textarea name="fullMessage" id="Message" placeholder="Write your message here" cols="70" rows="10" required
                ></textarea>
            </div>
            
            
            <div id="divButtons">
                <button type="submit">Send Message</button>
                <button type="reset">Cancel</button>
            </div>
            
        </form>
    </section>

    
        
    </body>
