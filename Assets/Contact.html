<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    
    <header class="navbar">
        <div class="nav-left">
            <a href="homepage.html">
                <img src="Logo & Icons/chapterly-logo.svg" class="search-icon" alt="search">
            </a>
            
            <ul>
                <li><a href="Bookshelves.html">My Bookshelves</a></li>
                <li><a href="Contact.html">Contact Us</a></li>
            </ul>
        </div>
        
        <div class="nav-right">
            <div class="search">
                <img src="Logo & Icons/search-icon.svg" alt="Search icon"classsearch-icon>
                <input type="text" placeholder="Search Here">
            </div>
        </div>
    </header>
    
    <section class="contact-section">
        
        <div class="contact-container">
            
            <div class="contact-info">
                
                <h2>Get in Touch!</h2>
                
                <div class="info-text">
                    <p>Email:</p>
                    <span>chapterly@example.com</span>
                    
                    <p>Phone:</p>
                    <span>+134567890</span>
                </div>
                
                <div class="socials">
                    <i class="fa-brands fa-facebook-f"></i>
                    <i class="fa-brands fa-tiktok"></i>
                    <i class="fa-brands fa-instagram"></i>
                </div>
            </div>
            
        </div>
        
        
        
        <form class="contact-form">
            <div class="top-inputs">
                
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" placeholder="Your full name">
                </div>
                
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" placeholder="Your email address">
                </div>
                
            </div>

            <div class="input-group">
                <label for="message">Message</label>
                <textarea placeholder="Write a message..."></textarea>
            </div>
            

            <button type="submit">Send Message</button>
        </form>


        <footer>
        <div class="footer-container">
            <p>&copy; 2026 Chapterly. All rights reserved.</p>
        </div>
    </footer>
    
</body>
</html>
