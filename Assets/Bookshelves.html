<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="bookshelves.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookshelves</title>
</head>
<body>
    
    <header class="navbar">
        <div class="nav-left">
            
            <a href="homepage.html" class="logo-link">
                <img src="logos-icons/chapterly-logo.svg" alt="Chapterly Logo" class="chapterly-icon">
            </a>
            
            <nav class="nav-links">
                
                <a href="Bookshelves.html">My Bookshelves</a>
                <span class="divider"></span>
                
                <a href="Contact.html">Contact Us</a>
                <span class="divider"></span>
                
                <a href="Discover.html">Discover</a>
            </nav>
        </div>
        
        <div class="nav-right">
            <div class="search">
                
                <img src="logos-icons/search-icon.svg" alt="Search Icon">
                
                <input type="text" placeholder="Search Here">
                
            </div>
        </div>
    </header>
    
    <button class="menu-toggle" id="menuToggle">
        
        <span id="menuArrow">></span>
        
    </button>
    
    <aside class="sidebar" id="sidebar">
        
        <div class="profile-section">
            
            <h1>Chapterly</h1>
            
            <img src="photos/pfp.webp" alt="Profile Picture" class="profile-pic">
            
            <p>@username</p>
            
        </div>
        
        <nav class="sidebar-links">
            
            <a href="profile.html">My Profile</a>
            <a href="">Settings</a>
            <a href="">Notifications</a>
            <a href="discover.html">Discover</a>
            
        </nav>
        
        <div class="sidebar-socials">
            
            <a href="#">
                <img src="logos-icons/facebook-logo.svg" alt="Facebook">
            </a>
            
            <a href="#">
                <img src="logos-icons/instagram-logo.svg" alt="Instagram">
            </a>
        </div>
    </aside>
    
    <script src="script.js"></script>
    
    
    <section class="bookshelves-page">
        
        <div class="bookshelf-box">
            
            <h2>Finished</h2>
            
            <div class="books-row">
                <img src="photos/26 Books That Need To Be Made Into A Movie Or TV Series ASAP.webp" alt="book 1">
                <img src="photos/Beautiful World, Where Are You.jpg" alt="book 2">
                <img src="photos/Amber Smith_ The Way I Used to Be (Paperback) - Walmart_com.webp" alt="book 3">
                <img src="photos/The Inmate by Freida McFadden _ Indigo Chapters.jpg" alt="book 4">
                <img src="photos/Bücher, eBooks, Spielzeug, uvm_ kaufen _ Thalia.jpg" alt="book 5">
            </div>
        </div>
        
        <div class="bookshelf-box">
            
            <h2>Want to Read</h2>
            
            <div class="books-row">
                <img src="photos/68 Books to Read While Social Distancing From Home, Recommended by Avid Readers.jpg" alt="book 1">
                <img src="photos/Every Summer After.jpg" alt="book 2">
                <img src="photos/Once Upon A Broken Heart_ Stephanie Garber.webp" alt="book 3">
            </div>
        </div>
        
        <div class="bookshelf-box">
            
            <h2>Favourites</h2>
            
            <div class="books-row">
                <img src="photos/Thrillers That Will Keep You Glued To The Page This Summer.jpg" alt="book 1">
                <img src="photos/download (19).jpg" alt="book 2">
                <img src="photos/The teacher by Frieda McFadden.jpg" alt="book 3">
            </div>
        </div>
    </section>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Chapterly. All rights reserved.</p>
        </div>
    </footer>
    
    
    
</body>
</html>
